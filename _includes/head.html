<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

{%- capture page_title -%}
{%- if page.title and page.url != "/" -%}{{ page.title }} · {{ site.title }}{%- else -%}{{ site.title }}{%- endif -%}
{%- endcapture -%}
{%- assign page_desc = page.description | default: site.description | strip_newlines | strip -%}
<title>{{ page_title }}</title>
<meta name="description" content="{{ page_desc }}">
<meta name="author" content="{{ site.author.name }}">
<link rel="canonical" href="{{ page.url | absolute_url }}">

<!-- No-flash theme + progressive-enhancement flag. Runs before CSS paint. -->
<script>
  (function () {
    var el = document.documentElement;
    el.classList.add('js');
    try {
      var t = localStorage.getItem('theme');
      if (t === 'light' || t === 'dark') el.setAttribute('data-theme', t);
    } catch (e) {}
  })();
</script>

<link rel="icon" href="{{ '/assets/img/favicon.svg' | relative_url }}" type="image/svg+xml">
<meta name="theme-color" content="#fcfcfa" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#141414" media="(prefers-color-scheme: dark)">

<!-- Open Graph / social cards -->
<meta property="og:type" content="{% if page.layout == 'article' %}article{% else %}website{% endif %}">
<meta property="og:title" content="{{ page_title }}">
<meta property="og:description" content="{{ page_desc }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:image" content="{{ '/assets/img/charles-gerrity.jpg' | absolute_url }}">
<meta property="og:image:alt" content="Portrait of Charles Grimes Gerrity">
<meta property="og:site_name" content="{{ site.author.name }}">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="{{ page_title }}">
<meta name="twitter:description" content="{{ page_desc }}">
<meta name="twitter:image" content="{{ '/assets/img/charles-gerrity.jpg' | absolute_url }}">
<meta name="twitter:image:alt" content="Portrait of Charles Grimes Gerrity">

<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
